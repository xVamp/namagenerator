<script>
const words = [
"Gojo","Naruto","Luffy","Zoro","Shadow","Dark","Ghost",
"King","Queen","Pro","Elite","Legend","Alpha","Omega",
"Fire","Ice","Storm","Blade","Cyber","Ninja","Boss"
];

const symbol = ["⚡","々","✧","☠","★","〆"];

function generate(){
let a = words[Math.floor(Math.random()*words.length)];
let b = words[Math.floor(Math.random()*words.length)];
let s = symbol[Math.floor(Math.random()*symbol.length)];
let n = Math.floor(Math.random()*9999);

let result = `『${a}${b}』${s}${n}`;

document.getElementById("hasil").innerText = result;
window.last = result;
}

function copyText(){
navigator.clipboard.writeText(window.last || "");
alert("Copied!");
}

function shareWA(){
let t = encodeURIComponent(window.last || "");
window.open("https://wa.me/?text="+t);
}
