<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Viral Pro Name Generator</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050505,#0a0a0a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:520px;
background:rgba(25,25,25,0.9);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px #00ffff55;
}

h1{
font-size:18px;
text-shadow:0 0 10px #00ffff;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.gen{background:#00e5ff;}
.copy{background:#00c853;}
.wa{background:#25D366;}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px #00ffff;
min-height:60px;
}

.badge{
margin-top:10px;
font-size:14px;
padding:5px 10px;
display:inline-block;
border-radius:10px;
background:#111;
border:1px solid #00ffff55;
}

.footer{
margin-top:10px;
font-size:11px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 VIRAL PRO NAME GENERATOR 🔥</h1>

<button class="gen" onclick="generate()">🎲 GENERATE</button>
<button class="copy" onclick="copyText()">📋 COPY</button>
<button class="wa" onclick="shareWA()">📤 SHARE WA</button>

<div class="result" id="hasil">Klik Generate</div>
<div class="badge" id="rarity">RARITY: -</div>

<div class="footer">
⚡ Viral Pro Mode • Installable PWA ⚡
</div>

</div>

<script>

// ===== VIRAL DATABASE =====
const words = [
"Gojo","Naruto","Luffy","Zoro","Itachi","Sasuke",
"Dark","Shadow","Ghost","Cyber","Alpha","Omega",
"King","Queen","Boss","Pro","Elite","Legend",
"AnakKota","Santuy","Gabut","Mabar","Rush",
"Fire","Ice","Storm","Void","Blade","Ninja"
];

const symbol = ["⚡","々","✧","☠","★","〆","ツ"];

// ===== RARITY SYSTEM =====
function getRarity(){
let r = Math.random();

if(r < 0.5) return "COMMON";
if(r < 0.75) return "RARE";
if(r < 0.93) return "EPIC";
return "LEGEND";
}

function generate(){

let w1 = words[Math.floor(Math.random()*words.length)];
let w2 = words[Math.floor(Math.random()*words.length)];
let s = symbol[Math.floor(Math.random()*symbol.length)];
let n = Math.floor(Math.random()*9999);

let name = `${w1}${w2}${s}${n}`;
let rarity = getRarity();

document.getElementById("hasil").innerText = name;
document.getElementById("rarity").innerText = "RARITY: " + rarity;

window.last = name;

}

function copyText(){
if(!window.last) return alert("Generate dulu!");
navigator.clipboard.writeText(window.last);
alert("Copied!");
}

function shareWA(){
if(!window.last) return alert("Generate dulu!");
let t = encodeURIComponent("🔥 Pro Name: " + window.last);
window.open("https://wa.me/?text="+t);
}

// ===== PWA INSTALL =====
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
