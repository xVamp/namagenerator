<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Infinite Name Generator Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050505,#111);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:95%;
max-width:520px;
background:rgba(20,20,20,0.9);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px #00ffff55;
border:1px solid #00ffff33;
}

h1{
font-size:20px;
text-shadow:0 0 10px #00ffff;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
}

.gen{background:#00e5ff;}
.copy{background:#00c853;}
.wa{background:#25D366;}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px #00ffff;
min-height:50px;
word-break:break-word;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #00ffff; }
to{ text-shadow:0 0 20px #00ffff; }
}

.footer{
margin-top:10px;
font-size:11px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ INFINITE NAME GENERATOR PRO ⚡</h1>

<select id="kategori">
<option value="ANIME">ANIME</option>
<option value="MOTOR">MOTOR</option>
<option value="MOBIL">MOBIL</option>
<option value="FF">FF</option>
</select>

<button class="gen" onclick="generate()">🎲 GENERATE</button>
<button class="copy" onclick="copyText()">📋 COPY</button>
<button class="wa" onclick="shareWA()">📤 SHARE WA</button>

<div class="result" id="hasil">Klik Generate</div>

<div class="footer">
⚡ Ban9jeck Infinite Mode © 2026 ⚡
</div>

</div>

<script>

// ===== 20 LIST PER KATEGORI =====
const data = {
ANIME:[
"Gojo","Naruto","Sasuke","Itachi","Luffy","Zoro","Eren","Levi","Tanjiro","Sukuna",
"Killua","Gon","Hisoka","Madara","Obito","Minato","Kakashi","Sanji","Shanks","Law"
],

MOTOR:[
"Ninja","Vario","CBR","R15","Aerox","Supra","MT15","KLX","Scoopy","Fino",
"PCX","Beat","Satria","GSX","Duke","Kawasaki","Yamaha","Honda","Suzuki","XSR"
],

MOBIL:[
"Supra","Ferrari","BMW","Lambo","Tesla","Mustang","Audi","Porsche","Bugatti","McLaren",
"Toyota","Honda","Nissan","Mazda","Lexus","GTR","Civic","Camry","Alphard","Hilux"
],

FF:[
"Alok","Kelly","Hayato","Chrono","Wukong","Skyler","Dimitri","Kenta","Miguel","Andrew",
"Caroline","Laura","Shani","Moco","Jota","Wolfrahh","Kapella","Maro","Orion","Xayne"
]
};

// ===== INFINITE PART =====
const prefix = [
"Dark","Shadow","Ghost","Cyber","Night",
"Alpha","Omega","Blade","Storm","Fire"
];

const symbol = ["々","⚡","✧","☠","★","〆","ツ"];

function generate(){

let type = document.getElementById("kategori").value;

let baseList = data[type];

let p = prefix[Math.floor(Math.random()*prefix.length)];
let b = baseList[Math.floor(Math.random()*baseList.length)];
let s = symbol[Math.floor(Math.random()*symbol.length)];
let n = Math.floor(Math.random()*9999);

let result = `『${p}${b}』${s}${n}`;

document.getElementById("hasil").innerText = result;
window.last = result;

}

function copyText(){
if(!window.last){
alert("Generate dulu!");
return;
}
navigator.clipboard.writeText(window.last);
alert("Copied!");
}

function shareWA(){
if(!window.last){
alert("Generate dulu!");
return;
}
let t = encodeURIComponent("🔥 Name: " + window.last);
window.open("https://wa.me/?text="+t);
}

</script>

</body>
</html>
