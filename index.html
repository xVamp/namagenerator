<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ban9jeck Name Generator 50+</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:650px;
margin:auto;
background:#1c1c1c;
padding:25px;
border-radius:15px;
}

select,button{
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:14px;
width:90%;
max-width:300px;
}

button{
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:24px;
color:#00ffcc;
min-height:50px;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Name Generator 50+ Kategori</h1>

<select id="kategori"></select>

<br>

<button onclick="generate()">🎲 Generate Nama</button>

<div class="result" id="hasil">Hasil muncul di sini</div>

<div class="footer">
⚡ Ban9jeck Tools © 2026 ⚡
</div>

</div>

<script>

// ===== 50 KATEGORI =====
const categories = [
"FF","ML","PUBG","FF_GUILD","ML_GUILD","TIKTOK","YT","INSTAGRAM","VIP","PRO",
"NOOB","HARDCORE","SADBOY","ALONE","SADGIRL","HACKER","STREAMER","GAMER","BOOYAH","WIN",
"LOSE","RANKED","CLAN","ESPORT","TOURNAMENT","INDO","SULSEL","MAKASSAR","PAREPARE","PANGKEP",
"MOTOR","MOBIL","SUPERCAR","MOTOGP","DRIFT","ANIME","NARUTO","ONEPIECE","JUJUTSU","DEMONSLAYER",
"HORROR","POCONG","KUNTILANAK","MEME","FUNNY","RANDOM","GHOST","KING","LEGEND","DRAGON"
];

// ===== POOL KATA =====
const words = [
"Dark","Shadow","Ghost","King","Queen","Dragon","Titan","Hunter",
"Legend","Viper","Storm","Thunder","Reaper","Phantom","Blaze","Fury"
];

const symbol = ["⚡","亗","々","☠","メ","✧"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

// isi dropdown
let select = document.getElementById("kategori");
categories.forEach(c=>{
let opt = document.createElement("option");
opt.value = c;
opt.innerText = c;
select.appendChild(opt);
});

function generate(){

let kategori = document.getElementById("kategori").value;

// pakai kata random (biar tidak ribet 50 logic)
let base = random(words);

let hasil = `『${kategori}-${base}』${random(symbol)}${Math.floor(Math.random()*999)}`;

document.getElementById("hasil").innerText = hasil;
}

</script>

</body>
</html>
