<script>

const data={

o.value=k;
o.innerText=k;

function enter(){

function generate(){

let k=document.getElementById("kategori").value;

// leaderboard fake

let lb=document.createElement("div");
lb.innerText=user+" ➜ "+current;
b.prepend(lb);

}

function copyText(){

}

function shareWA(){
let t=encodeURIComponent("🔥 "+current);
window.open("https://wa.me/?text="+t);
}
