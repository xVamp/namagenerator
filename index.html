<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Ban9jeck APK Name Generator</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:95%;
max-width:520px;
background:rgba(10,10,10,0.9);
padding:20px;
border-radius:18px;
text-align:center;
box-shadow:0 0 25px #00ffff55;
border:1px solid #00ffff33;
}

h1{
font-size:20px;
text-shadow:0 0 10px #00ffff;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
}

.gen{
background:#00e5ff;
font-weight:bold;
}

.copy{
background:#00c853;
color:white;
}

.wa{
background:#25D366;
color:white;
}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px #00ffff;
min-height:50px;
transition:0.2s;
}

.loading{
display:none;
margin-top:10px;
color:#00e5ff;
}

.board{
margin-top:15px;
text-align:left;
background:#111;
padding:10px;
border-radius:10px;
max-height:150px;
overflow:auto;
font-size:13px;
}

.footer{
margin-top:10px;
font-size:10px;
opacity:0.5;
}

/* glow anim */
@keyframes glow{
0%{text-shadow:0 0 5px #00ffff;}
50%{text-shadow:0 0 20px #00ffff;}
100%{text-shadow:0 0 5px #00ffff;}
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ APK NAME GENERATOR ⚡</h1>

<select id="kategori"></select>

<button class="gen" onclick="generate()">🎲 GENERATE</button>
<button class="copy" onclick="copyText()">📋 COPY</button>
<button class="wa" onclick="shareWA()">📤 SHARE WA</button>

<div class="loading" id="loading">Generating...</div>

<div class="result" id="hasil">Klik Generate</div>

<h3>🔥 Trending Names</h3>
<div class="board" id="board"></div>

<div class="footer">⚡ Ban9jeck APK Mode © 2026 ⚡</div>

</div>

<!-- SOUND -->
<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>

const data = {
FF:["Alok","Kelly","Hayato","Chrono","Wukong","Skyler"],
ML:["Alucard","Gusion","Lancelot","Ling","Fanny"],
ANIME:["Naruto","Sasuke","Gojo","Itachi","Zoro","Luffy"],
MOTOR:["Ninja","Vario","CBR","R15","Aerox"],
LEGEND:["King","Queen","Titan","Alpha","Omega"],
GHOST:["Pocong","Kuntilanak","Sundel","Wewe"],
HACKER:["Zero","Root","Byte","Ghost","DarkNet"],
DRAGON:["Fire","Ice","Storm","Void","Inferno"]
};

let trending = [];

// isi dropdown
let select=document.getElementById("kategori");
for(let k in data){
let opt=document.createElement("option");
opt.value=k;
opt.innerText=k;
select.appendChild(opt);
}

function playSound(){
document.getElementById("clickSound").play();
}

function showLoading(){
let load=document.getElementById("loading");
load.style.display="block";
setTimeout(()=>load.style.display="none",500);
}

function updateBoard(){
let board=document.getElementById("board");
board.innerHTML = trending.slice(-10).reverse().map(n=>`🔥 ${n}`).join("<br>");
}

function generate(){
playSound();
showLoading();

setTimeout(()=>{
let k=document.getElementById("kategori").value;
let list=data[k];

let base=list[Math.floor(Math.random()*list.length)];

window.nama=`『${base}』々${Math.floor(Math.random()*999)}`;

document.getElementById("hasil").innerText=window.nama;

// trending system
trending.push(window.nama);
updateBoard();

},500);
}

function copyText(){
if(!window.nama){alert("Generate dulu!");return;}
navigator.clipboard.writeText(window.nama);
alert("Copied!");
}

function shareWA(){
if(!window.nama){alert("Generate dulu!");return;}
let text=encodeURIComponent("🔥 Nama Keren: "+window.nama);
window.open("https://wa.me/?text="+text,"_blank");
}

</script>

</body>
</html>
