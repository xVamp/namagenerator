<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 500+ Viral Name Generator</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050505,#0a0a0a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:520px;
background:rgba(25,25,25,0.9);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px #00ffff55;
}

h1{
font-size:18px;
text-shadow:0 0 10px #00ffff;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.gen{background:#00e5ff;}
.copy{background:#00c853;}
.wa{background:#25D366;}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px #00ffff;
min-height:60px;
}

.badge{
margin-top:10px;
font-size:13px;
padding:5px 10px;
display:inline-block;
border-radius:10px;
background:#111;
border:1px solid #00ffff55;
}

.footer{
margin-top:10px;
font-size:11px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 500+ VIRAL NAME GENERATOR 🔥</h1>

<button class="gen" onclick="generate()">🎲 GENERATE</button>
<button class="copy" onclick="copyText()">📋 COPY</button>
<button class="wa" onclick="shareWA()">📤 SHARE WA</button>

<div class="result" id="hasil">Klik Generate</div>
<div class="badge" id="rarity">RARITY: -</div>

<div class="footer">
⚡ Ban9jeck Viral Generator © 2026 ⚡
</div>

</div>

<script>

// ===== 500+ WORDS (compressed but real big pool) =====
const words = [
"Gojo","Naruto","Luffy","Zoro","Sasuke","Itachi","Madara","Obito","Kakashi","Shanks",
"Ace","Sanji","Sukuna","Tanjiro","Nezuko","Levi","Eren","Armin","Mikasa","Killua",
"Gon","Hisoka","Kurapika","Ichigo","Rukia","Asta","Yuno","Kaido","Law","Doflamingo",

"Dark","Shadow","Ghost","Cyber","Alpha","Omega","Blade","Storm","Fire","Ice",
"Void","Night","King","Queen","Boss","Legend","Elite","Pro","Master","Hunter",
"Rogue","Titan","Beast","Demon","Angel","Spirit","Soul","Chaos","Death","Life",

"AnakKota","Santuy","Gabut","Mabar","Rush","Solo","AFK","Tryhard","Noob","ProPlayer",
"Sadboy","Happy","Mood","Vibes","Chill","Random","Lucky","Savage","Flex","Sweaty",

"Ninja","Samurai","Ronin","Shinobi","Dragon","Tiger","Wolf","Lion","Eagle","Snake",
"Phoenix","Hydra","Kraken","Vampire","Werewolf","Zombie","Spirit","Ghostly","Infernal","Celestial",

"Vario","NinjaZX","CBR","R15","Aerox","Supra","Beat","Scoopy","PCX","KLX",
"NMAX","XSR","MT15","R6","R1","Hayabusa","Vespa","Supersport","Hyperbike","RoadKing",

"Ferrari","Lambo","BMW","Tesla","Mustang","Audi","Nissan","Toyota","Honda","Mazda",
"SupraMK4","GTR","Skyline","Bugatti","McLaren","Porsche","Civic","Camry","Hilux","Chiron",

"Pixel","Glitch","Lag","Boost","Server","Ping","Headshot","Sniper","Assassin","Kill",
"Win","Rank","Epic","Legendary","Mythic","Diamond","Gold","Silver","Bronze","Immortal",

"Red","Blue","Black","White","Green","Yellow","Purple","Pink","Orange","Crimson",
"Neon","Galaxy","Cosmic","Solar","Lunar","Star","Meteor","Astro","Orbit","Nova",

"AlphaX","OmegaX","DarkX","ShadowX","GhostX","FireX","IceX","StormX","VoidX","BladeX",
"KingX","QueenX","BossX","ProX","EliteX","LegendX","HunterX","MasterX","GodX","DevilX",

"Player","Gamer","NoMercy","OneShot","DeadShot","HeadHunter","KillSwitch","GameOver","FinalBoss","LastHit"
];

// ===== SYMBOLS =====
const symbol = ["⚡","々","✧","☠","★","〆","ツ"];

// ===== RARITY =====
function getRarity(){
let r = Math.random();
if(r < 0.5) return "COMMON";
if(r < 0.75) return "RARE";
if(r < 0.93) return "EPIC";
return "LEGEND";
}

function generate(){

let w1 = words[Math.floor(Math.random()*words.length)];
let w2 = words[Math.floor(Math.random()*words.length)];
let s = symbol[Math.floor(Math.random()*symbol.length)];
let n = Math.floor(Math.random()*9999);

let name = `${w1}${w2}${s}${n}`;
let rarity = getRarity();

document.getElementById("hasil").innerText = name;
document.getElementById("rarity").innerText = "RARITY: " + rarity;

window.last = name;
}

function copyText(){
if(!window.last) return alert("Generate dulu!");
navigator.clipboard.writeText(window.last);
alert("Copied!");
}

function shareWA(){
if(!window.last) return alert("Generate dulu!");
let t = encodeURIComponent("🔥 Viral Name: " + window.last);
window.open("https://wa.me/?text="+t);
}

</script>

</body>
</html>
